# Server configuration
server.port=9090
spring.application.name=api-gateway

# Eureka Registry Location
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# --- MANDATORY LAB CONFIGURATIONS ---
# Enables case-insensitive service ID lookups (Step 20)
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# --- EXPLICIT ROUTE DEFINITIONS ---
# Account Service Route
spring.cloud.gateway.routes[0].id=account-service
spring.cloud.gateway.routes[0].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/account-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Loan Service Route
spring.cloud.gateway.routes[1].id=loan-service
spring.cloud.gateway.routes[1].uri=lb://LOAN-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/loan-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Greet Service Route
spring.cloud.gateway.routes[2].id=greet-service
spring.cloud.gateway.routes[2].uri=lb://GREET-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/greet-service/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# Actuator settings
management.endpoints.web.exposure.include=health,info
management.endpoint.info.enabled=true