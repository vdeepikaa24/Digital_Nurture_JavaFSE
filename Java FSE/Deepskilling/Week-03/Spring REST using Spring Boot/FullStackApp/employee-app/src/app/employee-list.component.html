<h2>Employee List</h2>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Department</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let employee of employees">
      <td>{{ employee.id }}</td>
      <td>{{ employee.name }}</td>
      <td>{{ employee.department.name }}</td>
      <td><a [routerLink]="['/edit', employee.id]">Edit</a></td>
    </tr>
  </tbody>
</table>
