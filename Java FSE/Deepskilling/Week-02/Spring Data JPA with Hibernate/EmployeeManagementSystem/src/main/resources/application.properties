# --- Database Connection Settings ---
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=deepi@24*

# --- JPA and Hibernate Settings ---
# Note: In modern Spring Boot, specifying the dialect is usually not needed.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 Console Configuration ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Allows remote access to the console if needed
spring.h2.console.settings.web-allow-others=true

# --- Server Port ---
server.port=8082

# --- Security Settings (if you have Spring Security dependency) ---
# If you are not actually using Spring Security, you can remove these.
# If you are, these set the default login credentials.
spring.security.user.name=user
spring.security.user.password=password